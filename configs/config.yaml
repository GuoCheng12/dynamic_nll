defaults:
  - _self_
  - model: depth_unet 
  - dataset: nyu_depth

dataset:
  name: "nyu_depth"
  train_data_path: "/datasets/workspace/dataset/nyu_depth_v2/sync"
  train_gt_path: "/datasets/workspace/dataset/nyu_depth_v2/sync"
  filenames_file: "/datasets/workspace/dynamic_nll/configs/dataset/nyudepthv2_train_files_with_gt.txt"
  eval_data_path: "/datasets/workspace/dataset/nyu_depth_v2/official_splits/test"
  eval_gt_path: "/datasets/workspace/dataset/nyu_depth_v2/official_splits/test"
  filenames_file_eval: "/datasets/workspace/dynamic_nll/configs/dataset/nyudepthv2_test_files_with_gt.txt"
  input_height: 416
  input_width: 544
  min_depth: 0.001
  max_depth: 10.0
  min_depth_eval: 0.001
  max_depth_eval: 10.0
  eigen_crop: True 

  do_random_rotate: True #
  degree: 2.5            
  
  batch_size: 16         
  num_workers: 16

model:
  name: "depth_unet"
  encoder: "tf_efficientnet_b5_ap"
  pretrained: True
  min_depth: 0.001
  max_val: 10.0

hyperparameters:
  batch_size: 128
  lr: 6e-3 # recommand 6e-3 for bs=16
  eval_batch_size: 1
  num_workers: 0
  weight_decay: 0.1
  epochs: 25
  checkpoint_interval: 5
  div_factor: 25.0
  final_div_factor: 100.0

uncertainty:
  loss_type: "beta_nll" # beta_nll or faithful
  beta_strategy: "linear_decay" # "constant" or "linear_decay" or "delayed_linear" or "cosine" or "plateau"
  beta_start: 1.0
  beta_end: 0.2
  faithful_lambda_strategy: "linear_decay"
  faithful_lambda_start: 0.0
  faithful_lambda_end: 1.0
  total_steps: ${hyperparameters.epochs}
  controller:
    enabled: false
    mode: "beta_only"
    signal: "metrics"
    update_interval: 50
    warmup_epochs: 200
    beta_min: 0.2
    beta_max: 1.0
    gamma_min: 0.0
    gamma_max: 1.0
    beta_step: 0.1
    gamma_step: 0.1
    collapse_thresh: 0.02
    align_thresh: 0.30
    rmse_plateau_thresh: 0.005
    grad_ratio_thresh: 1.0
    grad_cosine_thresh: 0.0
    gamma_release_beta_thresh: 0.6
    fixed_gamma_t: null

logging:
  use_wandb: True
  project_name: "nyu_depth"
  run_name: "NYU_unet_nll_beta0.0_bs16" 
seed: 42
device: auto
